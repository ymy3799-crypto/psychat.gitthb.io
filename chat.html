<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindLane | Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="chat-body">
    <div class="ambient ambient-chat"></div>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <button id="mobileSidebarToggle" class="sidebar-toggle mobile-only" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
          </button>
          <div>
            <p class="eyebrow">Account</p>
            <h2 id="sidebarUserName" class="sidebar-username"></h2>
          </div>
        </div>

        <div class="sidebar-quick-actions">
          <a class="secondary-button full-width" href="./measure.html">Open measure</a>
          <div id="measureBadge" class="measure-badge">Not completed</div>
        </div>

        <button id="newChatSidebarButton" class="secondary-button full-width">New chat</button>

        <section class="conversation-panel">
          <div class="conversation-panel-head">
            <h3>History</h3>
            <span id="conversationCount" class="conversation-count">0</span>
          </div>
          <div id="conversationList" class="conversation-list"></div>
        </section>

        <button id="logoutButton" class="text-button align-left">Log out</button>
      </aside>

      <main class="chat-main">
        <header class="chat-header chat-header-minimal">
          <button id="desktopSidebarToggle" class="sidebar-toggle desktop-only" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
          </button>
        </header>

        <section id="chatStatus" class="chat-status" aria-live="polite"></section>

        <section id="measureGate" class="measure-gate" hidden>
          <p>Please complete the questionnaire before chatting.</p>
          <a class="primary-button" href="./measure.html">Go to measure</a>
        </section>

        <section id="messageViewport" class="message-viewport">
          <div id="emptyState" class="empty-state">
            <span class="empty-icon">○</span>
            <h2>Start here</h2>
            <p>You can share something that has been on your mind recently.</p>
          </div>

          <div id="messageList" class="message-list" hidden></div>
        </section>

        <footer class="composer-wrap">
          <form id="chatForm" class="composer-form">
            <label class="composer-label" for="messageInput">Message</label>
            <div class="composer-panel">
              <textarea id="messageInput" rows="1" maxlength="4000" placeholder="Type a message..."></textarea>
              <div class="composer-actions">
                <p class="composer-tip">Enter to send, Shift + Enter for a new line</p>
                <button id="sendButton" type="submit" class="primary-button compact-button">Send</button>
              </div>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <script src="./chat.js"></script>
  </body>
</html>
