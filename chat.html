<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindLane | 对话</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="chat-body">
    <div class="ambient ambient-chat"></div>

    <div class="app-shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-head">
          <button id="mobileSidebarToggle" class="sidebar-toggle mobile-only" aria-label="展开或收起侧边栏">
            <span></span>
            <span></span>
          </button>
          <div>
            <p class="eyebrow">Account</p>
            <h2 id="sidebarUserName" class="sidebar-username"></h2>
          </div>
        </div>

        <button id="newChatSidebarButton" class="secondary-button full-width">开始新对话</button>

        <section class="conversation-panel">
          <div class="conversation-panel-head">
            <h3>聊天记录</h3>
            <span id="conversationCount" class="conversation-count">0</span>
          </div>
          <div id="conversationList" class="conversation-list"></div>
        </section>

        <button id="logoutButton" class="text-button align-left">退出</button>
      </aside>

      <main class="chat-main">
        <header class="chat-header chat-header-minimal">
          <button id="desktopSidebarToggle" class="sidebar-toggle desktop-only" aria-label="展开或收起侧边栏">
            <span></span>
            <span></span>
          </button>
        </header>

        <section id="chatStatus" class="chat-status" aria-live="polite"></section>

        <section id="messageViewport" class="message-viewport">
          <div id="emptyState" class="empty-state">
            <span class="empty-icon">∿</span>
            <h2>从这里开始</h2>
            <p>你可以分享最近在意的事情、情绪起伏，或某个反复出现的想法。</p>
          </div>

          <div id="messageList" class="message-list" hidden></div>
        </section>

        <footer class="composer-wrap">
          <form id="chatForm" class="composer-form">
            <label class="composer-label" for="messageInput">输入消息</label>
            <div class="composer-panel">
              <textarea
                id="messageInput"
                rows="1"
                maxlength="4000"
                placeholder="输入消息..."
              ></textarea>
              <div class="composer-actions">
                <p class="composer-tip">Enter 发送，Shift + Enter 换行</p>
                <button id="sendButton" type="submit" class="primary-button compact-button">发送</button>
              </div>
            </div>
          </form>
        </footer>
      </main>
    </div>

    <script src="./chat.js"></script>
  </body>
</html>
