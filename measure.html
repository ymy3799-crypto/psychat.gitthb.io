<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindLane | 测量</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="measure-body">
    <div class="ambient ambient-chat"></div>

    <main class="measure-shell">
      <header class="measure-hero">
        <p class="eyebrow">Measure</p>
        <h1>测量</h1>
      </header>

      <section class="measure-card">
        <div class="measure-meta">
          <div>
            <h2>填写说明</h2>
            <p>下面是一些描述人们性格特点的句子，请根据每个句子与您的性格相符程度选择合适的选项。</p>
          </div>
          <div id="measureStatus" class="measure-status" aria-live="polite"></div>
        </div>

        <div id="measureLocked" class="measure-locked" hidden>
          <h3>你已完成测量</h3>
          <p>本次实验中每位用户只需填写一次量表，后续可直接进入对话。</p>
          <div class="measure-locked-actions">
            <a class="primary-button" href="./chat.html">进入对话</a>
            <button id="resetMeasureButton" type="button" class="secondary-button">重新填写</button>
          </div>
        </div>

        <form id="measureForm" class="measure-form" novalidate></form>

        <template id="questionTemplate">
          <section class="question-card likert-card">
            <div class="likert-row">
              <div class="question-head likert-question">
                <span class="question-index"></span>
                <p class="question-text"></p>
              </div>
              <div class="option-grid likert-grid"></div>
            </div>
          </section>
        </template>

        <div class="measure-actions">
          <button id="saveMeasureButton" type="submit" form="measureForm" class="primary-button">提交测量</button>
          <a class="secondary-button" href="./chat.html">暂时返回对话页</a>
        </div>
      </section>
    </main>

    <script src="./measure.js"></script>
  </body>
</html>
