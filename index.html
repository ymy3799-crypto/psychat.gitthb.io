<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindLane | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-body">
    <div class="ambient ambient-auth"></div>

    <main class="auth-shell auth-shell-simple">
      <section class="auth-brand auth-brand-simple">
        <h1>A space to talk about what is on your mind.</h1>
      </section>

      <section class="auth-card">
        <header class="auth-card-head">
          <div>
            <p class="eyebrow">Welcome</p>
            <h2>Login or Register</h2>
          </div>
          <div class="tab-switch" role="tablist" aria-label="Login or Register">
            <button class="tab-button active" data-tab="login" role="tab" aria-selected="true">Login</button>
            <button class="tab-button" data-tab="register" role="tab" aria-selected="false">Register</button>
          </div>
        </header>

        <div id="authFeedback" class="feedback" aria-live="polite"></div>

        <form id="loginForm" class="auth-form active" novalidate>
          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter your email" autocomplete="email" required />
          </label>

          <label class="field">
            <span>Password</span>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                minlength="6"
                required
              />
              <button type="button" class="ghost-button toggle-password">Show</button>
            </div>
          </label>

          <button type="submit" class="primary-button">Continue</button>
        </form>

        <form id="registerForm" class="auth-form" novalidate>
          <label class="field">
            <span>Display name (optional)</span>
            <input type="text" name="displayName" placeholder="Enter a display name" autocomplete="nickname" />
          </label>

          <label class="field">
            <span>Email</span>
            <input type="email" name="email" placeholder="Enter your email" autocomplete="email" required />
          </label>

          <label class="field">
            <span>Password</span>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                placeholder="At least 6 characters"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button type="button" class="ghost-button toggle-password">Show</button>
            </div>
          </label>

          <label class="field">
            <span>Confirm password</span>
            <div class="password-wrap">
              <input
                type="password"
                name="confirmPassword"
                placeholder="Enter your password again"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button type="button" class="ghost-button toggle-password">Show</button>
            </div>
          </label>

          <button type="submit" class="primary-button">Create account</button>
        </form>
      </section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
