<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MindLane | 登录与注册</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-body">
    <div class="ambient ambient-auth"></div>

    <main class="auth-shell">
      <section class="auth-brand">
        <span class="brand-pill">CBT Support Platform</span>
        <h1>为情绪留出空间，让对话慢慢帮你梳理思路。</h1>
        <p>
          这是一个面向网页场景设计的 CBT 心理支持对话平台前端原型。界面强调平静、清晰和可达性，适合后续接入
          DeepSeek 与云端服务。
        </p>

        <div class="brand-points">
          <article>
            <h2>温和的视觉体验</h2>
            <p>低饱和度色彩、柔和留白与清晰信息层级，兼顾电脑端与手机端浏览体验。</p>
          </article>
          <article>
            <h2>适合连续对话</h2>
            <p>聊天界面参考主流 AI 产品的结构，方便后续接入历史会话与多轮上下文。</p>
          </article>
          <article>
            <h2>轻量前端架构</h2>
            <p>使用原生 HTML、CSS、JavaScript 编写，易于理解、部署与二次修改。</p>
          </article>
        </div>
      </section>

      <section class="auth-card">
        <header class="auth-card-head">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h2>登录或创建账户</h2>
          </div>
          <div class="tab-switch" role="tablist" aria-label="登录或注册">
            <button class="tab-button active" data-tab="login" role="tab" aria-selected="true">
              登录
            </button>
            <button class="tab-button" data-tab="register" role="tab" aria-selected="false">
              注册
            </button>
          </div>
        </header>

        <div id="authFeedback" class="feedback" aria-live="polite"></div>

        <form id="loginForm" class="auth-form active" novalidate>
          <label class="field">
            <span>邮箱</span>
            <input type="email" name="email" placeholder="请输入邮箱地址" autocomplete="email" required />
          </label>

          <label class="field">
            <span>密码</span>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                placeholder="请输入密码"
                autocomplete="current-password"
                minlength="6"
                required
              />
              <button type="button" class="ghost-button toggle-password">显示</button>
            </div>
          </label>

          <div class="form-row">
            <label class="checkline">
              <input type="checkbox" name="remember" />
              <span>记住我</span>
            </label>
            <button type="button" id="forgotPasswordButton" class="text-button">找回密码</button>
          </div>

          <button type="submit" class="primary-button">登录并进入主页</button>
        </form>

        <form id="registerForm" class="auth-form" novalidate>
          <label class="field">
            <span>昵称</span>
            <input type="text" name="displayName" placeholder="请输入昵称" autocomplete="nickname" required />
          </label>

          <label class="field">
            <span>邮箱</span>
            <input type="email" name="email" placeholder="请输入邮箱地址" autocomplete="email" required />
          </label>

          <label class="field">
            <span>密码</span>
            <div class="password-wrap">
              <input
                type="password"
                name="password"
                placeholder="至少 6 位密码"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button type="button" class="ghost-button toggle-password">显示</button>
            </div>
          </label>

          <label class="field">
            <span>确认密码</span>
            <div class="password-wrap">
              <input
                type="password"
                name="confirmPassword"
                placeholder="请再次输入密码"
                autocomplete="new-password"
                minlength="6"
                required
              />
              <button type="button" class="ghost-button toggle-password">显示</button>
            </div>
          </label>

          <button type="submit" class="primary-button">创建账户</button>
        </form>
      </section>
    </main>

    <script src="./auth.js"></script>
  </body>
</html>
